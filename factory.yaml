substitutions:
  # Device identity and reference board pin mapping.
  device_name: airtouch-temp-bridge
  friendly_name: AirTouch Temperature Bridge
  bridge_rx_pin: GPIO7
  bridge_tx_pin: GPIO5
  status_led_pin: GPIO18
  temperature_led_pin: GPIO16

# Load the temperature bridge component from this repository.
external_components:
  - source: github://projectcobalt/Airtouch-Temperature-Bridge
    components:
      - temperature_encoding_bridge

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: projectcobalt.airtouch-temperature-bridge
    version: "1.0.1"

esp32:
  board: lolin_s2_mini
  variant: ESP32S2
  framework:
    type: arduino

logger:
  level: INFO

# Hardware status and temperature-update indicators.
status_led:
  pin:
    number: ${status_led_pin}
    inverted: false

output:
  - platform: gpio
    id: temperature_update_led
    pin:
      number: ${temperature_led_pin}
      inverted: false

# UART connection to the controller.
uart:
  - id: bridge_uart
    rx_pin: ${bridge_rx_pin}
    tx_pin: ${bridge_tx_pin}
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: NONE
    rx_buffer_size: 2048

# Provisioning and adoption services.
api:

ota:
  - platform: esphome

wifi:

improv_serial:

# Start with no zones; configure them after the device is adopted.
temperature_encoding_bridge:
  id: temperature_bridge
  uart_id: bridge_uart
  fallback_zone_count: 1
  temperature_led: temperature_update_led
  temperature_reporting: true
  raw_logging: false
  zones: []
