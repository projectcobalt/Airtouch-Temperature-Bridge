substitutions:
  # Device identity and board-specific pin mapping.
  device_name: temperature-bridge
  friendly_name: AirTouch Temperature Bridge
  bridge_rx_pin: GPIO7
  bridge_tx_pin: GPIO5
  status_led_pin: GPIO18
  temperature_led_pin: GPIO16
  sensor_report_interval: 30s
  led_pulse_duration: 150ms

# Load the temperature bridge component from this repository.
external_components:
  - source: github://projectcobalt/Airtouch-Temperature-Bridge
    components:
      - temperature_encoding_bridge

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: projectcobalt.airtouch-temperature-bridge
    version: "2.0.0"

esp32:
  board: lolin_s2_mini
  variant: ESP32S2
  framework:
    type: arduino

logger:
  level: INFO

# Hardware status and temperature-update indicators.
status_led:
  pin:
    number: ${status_led_pin}
    inverted: false

output:
  - platform: gpio
    id: temperature_update_led
    pin:
      number: ${temperature_led_pin}
      inverted: false

# UART connection to the controller.
uart:
  - id: bridge_uart
    rx_pin: ${bridge_rx_pin}
    tx_pin: ${bridge_tx_pin}
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: NONE
    rx_buffer_size: 2048

# Home Assistant connectivity and device updates.
api:
  encryption:
    key: !secret temperature_bridge_api_key

ota:
  - platform: esphome
    password: !secret temperature_bridge_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Configure the zones that publish Home Assistant temperatures.
# The controller may report fewer active zones than fallback_zone_count;
# configured groups above its live count are skipped automatically.
temperature_encoding_bridge:
  id: temperature_bridge
  uart_id: bridge_uart
  fallback_zone_count: 2
  temperature_led: temperature_update_led
  report_interval: ${sensor_report_interval}
  led_pulse_duration: ${led_pulse_duration}
  temperature_reporting: true
  raw_logging: false
  zones:
    # One source uses its state directly. Aggregation defaults to average.
    - group: 1
      temperature_sensors:
        - living_room_temperature

    # Two or three sources can be averaged, or aggregation can be min/max.
    - group: 2
      aggregation: average
      temperature_sensors:
        - bedroom_temperature
        - bedroom_remote_temperature

# Temperature inputs. Home Assistant, OneWire, I2C, BLE, and other ESPHome
# sensors can all be referenced by ID in the bridge configuration above.
debug:
  update_interval: 60s

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

sensor:
  - platform: homeassistant
    id: living_room_temperature
    entity_id: sensor.living_room_temperature

  - platform: homeassistant
    id: bedroom_temperature
    entity_id: sensor.bedroom_temperature

  - platform: homeassistant
    id: bedroom_remote_temperature
    entity_id: sensor.bedroom_remote_temperature

  # Hardware and bridge health diagnostics.
  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: internal_temperature
    name: "ESP Temperature"
    update_interval: 60s

  - platform: debug
    free:
      name: "Free Heap"
    block:
      name: "Largest Free Heap Block"
    min_free:
      name: "Minimum Free Heap"
    fragmentation:
      name: "Heap Fragmentation"
    loop_time:
      name: "Loop Time"

  - platform: template
    name: "Bridge RX Frames"
    entity_category: diagnostic
    icon: mdi:download-network-outline
    accuracy_decimals: 0
    update_interval: 60s
    state_class: total_increasing
    lambda: |-
      return id(temperature_bridge).get_rx_frame_count();

  - platform: template
    name: "Bridge TX Frames"
    entity_category: diagnostic
    icon: mdi:upload-network-outline
    accuracy_decimals: 0
    update_interval: 60s
    state_class: total_increasing
    lambda: |-
      return id(temperature_bridge).get_tx_frame_count();

  - platform: template
    name: "Bridge CRC Errors"
    entity_category: diagnostic
    icon: mdi:alert-circle-outline
    accuracy_decimals: 0
    update_interval: 60s
    state_class: total_increasing
    lambda: |-
      return id(temperature_bridge).get_crc_error_count();

  - platform: template
    name: "Bridge Parser Resyncs"
    entity_category: diagnostic
    icon: mdi:sync-alert
    accuracy_decimals: 0
    update_interval: 60s
    state_class: total_increasing
    lambda: |-
      return id(temperature_bridge).get_parser_resync_count();

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

  - platform: debug
    reset_reason:
      name: "Reset Reason"
