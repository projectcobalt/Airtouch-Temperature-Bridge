substitutions:
  device_name: temperature-bridge
  friendly_name: AirTouch Temperature Bridge
  # Change these four pins to match your ESP32 board and wiring.
  bridge_rx_pin: GPIO7
  bridge_tx_pin: GPIO5
  status_led_pin: GPIO18
  temperature_led_pin: GPIO16

# The bridge package creates the UART, status LED, activity LED, and external
# component. The diagnostics package is optional but recommended.
packages:
  bridge: github://projectcobalt/Airtouch-Temperature-Bridge/packages/airtouch-temperature-bridge.yaml@main
  diagnostics: github://projectcobalt/Airtouch-Temperature-Bridge/packages/hardware-diagnostics.yaml@main

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: lolin_s2_mini
  variant: ESP32S2
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret temperature_bridge_api_key

ota:
  - platform: esphome
    password: !secret temperature_bridge_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Only groups listed here send temperatures. The controller can report fewer
# active zones than fallback_zone_count; reports above its live count are
# automatically skipped.
temperature_encoding_bridge:
  id: temperature_bridge
  uart_id: bridge_uart
  fallback_zone_count: 2
  temperature_led: temperature_update_led
  temperature_reporting: true
  raw_logging: false
  zones:
    # One source uses its state directly. Aggregation defaults to average.
    - group: 1
      temperature_entities:
        - sensor.living_room_temperature

    # Two or three sources can be averaged, or aggregation can be min/max.
    - group: 2
      aggregation: average
      temperature_entities:
        - sensor.bedroom_temperature
        - sensor.bedroom_remote_temperature
