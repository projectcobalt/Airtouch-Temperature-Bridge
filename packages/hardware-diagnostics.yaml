debug:
  update_interval: 60s

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: internal_temperature
    name: "ESP Temperature"
    update_interval: 60s

  - platform: debug
    free:
      name: "Free Heap"
    block:
      name: "Largest Free Heap Block"
    min_free:
      name: "Minimum Free Heap"
    fragmentation:
      name: "Heap Fragmentation"
    loop_time:
      name: "Loop Time"

  - platform: template
    name: "Bridge RX Frames"
    entity_category: diagnostic
    icon: mdi:download-network-outline
    accuracy_decimals: 0
    update_interval: 60s
    state_class: total_increasing
    lambda: |-
      return id(temperature_bridge).get_rx_frame_count();

  - platform: template
    name: "Bridge TX Frames"
    entity_category: diagnostic
    icon: mdi:upload-network-outline
    accuracy_decimals: 0
    update_interval: 60s
    state_class: total_increasing
    lambda: |-
      return id(temperature_bridge).get_tx_frame_count();

  - platform: template
    name: "Bridge CRC Errors"
    entity_category: diagnostic
    icon: mdi:alert-circle-outline
    accuracy_decimals: 0
    update_interval: 60s
    state_class: total_increasing
    lambda: |-
      return id(temperature_bridge).get_crc_error_count();

  - platform: template
    name: "Bridge Parser Resyncs"
    entity_category: diagnostic
    icon: mdi:sync-alert
    accuracy_decimals: 0
    update_interval: 60s
    state_class: total_increasing
    lambda: |-
      return id(temperature_bridge).get_parser_resync_count();

text_sensor:
  - platform: version
    name: "ESPHome Version"

  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"
